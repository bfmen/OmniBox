# wrangler.toml - OmniBox Proxy Worker 配置
name = "omnibox"
main = "src/worker.ts"
compatibility_date = "2024-12-19"
compatibility_flags = ["nodejs_compat"]
preview_urls = false  

# 环境变量配置
[vars]
# 调试模式：true(开启详细错误信息)/false(仅显示通用错误)
DEBUG = "false"

# 日志级别：error/warn/info/debug (数字越小越严格)
LOG_LEVEL = "warn"

# ==================== 安全配置 ====================
# 代理访问密码（密钥，仅通过 Cloudflare Dashboard 添加 Secret）
# PROXY_PASSWORD

# 是否显示密码输入页面：true(显示)/false(直接返回403)
SHOW_PASSWORD_PAGE = "true"

# 爬虫黑名单（逗号分隔的 UA 关键词，默认已包含 Bytespider/GPTBot/CCBot/SemrushBot/AhrefsBot）
# 如需追加，填写如：BLOCKED_UA_PATTERNS = "MyBot,AnotherBot"
BLOCKED_UA_PATTERNS = ""

# 监控和可观测性配置
[observability]
enabled = true

# ==================== 注意事项 ====================
# 1. 配置管理规范：
#    - 文本变量：仅在此文件中配置
#    - 密钥(Secret)：仅通过 Cloudflare Dashboard 添加
